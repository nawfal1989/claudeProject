name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

jobs:
  claude:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    permissions:
      contents: write # allow branch creation and commit push
      pull-requests: write # allow PR creation
      issues: write # allow issue comments
      checks: write # allow CI checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Claude Code Action
        uses: anthropics/claude-code-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # Claude custom instructions
          custom_instructions: |
            The project is already set up with all dependencies installed.
            The server runs at localhost:3000 and logs are in logs.txt.
            You can query the database using sqlite3 if needed.
            Use Playwright tools to interact with the app if necessary.

          # MCP config for Playwright automation
          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": [
                    "@playwright/mcp@latest",
                    "--allowed-origins",
                    "localhost:3000;cdn.tailwindcss.com;esm.sh"
                  ]
                }
              }
            }

          # Tools Claude is allowed to use
          allowed_tools: "Bash(npm:*),Bash(sqlite3:*),mcp__playwright__browser_snapshot,mcp__playwright__browser_click"

        env:
          # Required for Claude API access
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
