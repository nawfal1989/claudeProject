name: Claude Code

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Claude Code
        uses: anthropics/claude-code-action@v2.1.81
        with:
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
